<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quity Clinic Portal — UI Kit</title>
<link rel="icon" href="../../assets/logo.svg" />
<link rel="stylesheet" href="../../fonts/fonts.css" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--sidebar); color: var(--foreground); font-family: var(--font-sans); }
  .app {
    display: flex; height: 100vh; overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 256px; flex: 0 0 auto;
    background: var(--sidebar);
    display: flex; flex-direction: column;
    transition: width .2s ease;
  }
  .sidebar.collapsed { width: 68px; }
  .sidebar-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px;
  }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--sidebar-primary);
    color: var(--sidebar-primary-foreground);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 16px; height: 16px; }
  .logo-wordmark { display: grid; line-height: 1.15; }
  .logo-wordmark .name { font-weight: 600; font-size: 14px; color: var(--foreground); }
  .logo-wordmark .sub { font-size: 12px; color: color-mix(in srgb, var(--sidebar-foreground) 50%, transparent); }
  .sidebar.collapsed .logo-wordmark { display: none; }
  .sidebar.collapsed .sidebar-header { justify-content: center; padding: 16px 8px; }

  .nav-group { margin-bottom: 24px; }
  .nav-label {
    padding: 0 20px 8px; font-size: 11px; font-weight: 500;
    color: color-mix(in srgb, var(--sidebar-foreground) 40%, transparent);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .sidebar.collapsed .nav-label { display: none; }
  .nav-item {
    display: flex; align-items: center; gap: 16px;
    margin: 3px 12px; padding: 8px 16px;
    font-size: 14px; border-radius: 10px;
    color: color-mix(in srgb, var(--sidebar-foreground) 60%, transparent);
    cursor: pointer; transition: background-color .12s, color .12s;
    text-decoration: none;
  }
  .nav-item:hover { background: color-mix(in srgb, var(--sidebar-accent) 50%, transparent); color: var(--sidebar-accent-foreground); }
  .nav-item.active { background: var(--primary); color: var(--primary-foreground); font-weight: 500; }
  .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
  .sidebar.collapsed .nav-item { justify-content: center; margin: 0 6px; padding: 8px 12px; }
  .sidebar.collapsed .nav-item span { display: none; }

  .sidebar-spacer { flex: 1; }
  .user-dropdown {
    display: flex; align-items: center; gap: 12px;
    margin: 12px; padding: 8px; border-radius: 8px;
    font-size: 14px; cursor: pointer;
    transition: background-color .12s;
  }
  .user-dropdown:hover { background: color-mix(in srgb, var(--sidebar-accent) 50%, transparent); }
  .sidebar.collapsed .user-dropdown { justify-content: center; padding: 8px 0; margin: 12px 8px; }
  .sidebar.collapsed .user-dropdown .user-meta, .sidebar.collapsed .user-dropdown .chev { display: none; }

  .avatar {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--secondary); color: var(--secondary-foreground);
    display: grid; place-items: center; font-size: 12px; font-weight: 600;
    flex-shrink: 0;
  }
  .avatar.round { border-radius: 999px; }
  .avatar.lg { width: 40px; height: 40px; font-size: 14px; }
  .avatar.tint-primary { background: color-mix(in srgb, var(--primary) 12%, transparent); color: var(--primary); }

  .user-meta { display: grid; flex: 1; line-height: 1.2; min-width: 0; }
  .user-meta .name { font-weight: 600; font-size: 14px; }
  .user-meta .email { font-size: 12px; color: color-mix(in srgb, var(--sidebar-foreground) 50%, transparent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chev { color: color-mix(in srgb, var(--sidebar-foreground) 50%, transparent); }
  .chev svg { width: 16px; height: 16px; }

  /* --- Main panel (rounded card shell) --- */
  .panel {
    flex: 1; display: flex; flex-direction: column;
    background: var(--background); border-top: 1px solid var(--border);
    border-top-left-radius: 16px; overflow: hidden;
    margin: 8px 8px 8px 0; box-shadow: var(--shadow-sm);
  }
  .header {
    height: 56px; display: flex; align-items: center; gap: 12px;
    padding: 0 16px; flex-shrink: 0;
  }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--background);
    display: grid; place-items: center; cursor: pointer;
    transition: background-color .12s, color .12s;
    color: var(--foreground);
  }
  .icon-btn:hover { background: var(--muted); }
  .icon-btn svg { width: 16px; height: 16px; }
  .divider-v { height: 16px; width: 1px; background: var(--border); flex-shrink: 0; }

  .breadcrumbs { display: flex; align-items: center; gap: 4px; font-size: 14px; color: var(--muted-foreground); }
  .breadcrumbs a { color: inherit; text-decoration: none; transition: color .12s; text-transform: capitalize; }
  .breadcrumbs a:hover { color: var(--foreground); }
  .breadcrumbs .current { color: var(--foreground); font-weight: 500; text-transform: capitalize; }
  .breadcrumbs svg { width: 12px; height: 12px; }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 10px; width: 16px; height: 16px; color: var(--muted-foreground); }
  .input {
    height: 36px; border: 1px solid var(--input); border-radius: 10px;
    background: transparent; padding: 0 12px; font-size: 14px;
    font-family: inherit; color: var(--foreground);
    outline: none; transition: border-color .12s, box-shadow .12s;
    width: 100%;
  }
  .input::placeholder { color: var(--muted-foreground); }
  .input:focus-visible { border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent); }
  .search-wrap .input { width: 256px; padding-left: 32px; height: 36px; }

  /* --- Main content --- */
  .main {
    flex: 1; overflow-y: auto; padding: 24px;
  }
  .stack > * + * { margin-top: 24px; }
  .page-header {
    display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px;
  }
  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
  .page-sub { font-size: 14px; color: var(--muted-foreground); margin: 4px 0 0; }
  .page-actions { display: flex; align-items: center; gap: 8px; }

  /* --- Card --- */
  .card {
    background: var(--card); border-radius: 16px;
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--foreground) 10%, transparent);
    padding: 16px;
  }
  .card-title { font-size: 16px; font-weight: 500; margin: 0 0 4px; }
  .card-desc { font-size: 14px; color: var(--muted-foreground); margin: 0; }

  /* --- Button --- */
  .btn {
    height: 32px; padding: 0 10px; border-radius: 10px;
    border: 1px solid transparent; background: var(--primary); color: var(--primary-foreground);
    font-family: inherit; font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; transition: background-color .12s, color .12s, transform .06s, border-color .12s;
    outline: none; white-space: nowrap;
  }
  .btn:hover { background: color-mix(in srgb, var(--primary) 80%, transparent); }
  .btn:active { transform: translateY(1px); }
  .btn:focus-visible { box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent); border-color: var(--ring); }
  .btn svg { width: 16px; height: 16px; }
  .btn-sm { height: 28px; padding: 0 10px; font-size: 13px; border-radius: 12px; }
  .btn-outline { background: var(--background); color: var(--foreground); border-color: var(--border); }
  .btn-outline:hover { background: var(--muted); }
  .btn-ghost { background: transparent; color: var(--foreground); }
  .btn-ghost:hover { background: var(--muted); }
  .btn-secondary { background: var(--secondary); color: var(--secondary-foreground); }
  .btn-secondary:hover { background: color-mix(in srgb, var(--secondary) 80%, transparent); }
  .btn-destructive { background: color-mix(in srgb, var(--destructive) 10%, transparent); color: var(--destructive); }
  .btn-destructive:hover { background: color-mix(in srgb, var(--destructive) 20%, transparent); }
  .btn-icon { width: 32px; padding: 0; }
  .btn-dashed {
    border: 1px dashed var(--border); background: var(--background); color: var(--foreground);
    padding: 0 12px; height: 36px;
  }
  .btn-dashed:hover { background: var(--muted); }
  .btn-dashed.active { border-color: color-mix(in srgb, var(--primary) 50%, transparent); background: color-mix(in srgb, var(--primary) 5%, transparent); }

  /* --- Badge --- */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 20px; padding: 0 8px;
    font-size: 12px; font-weight: 500;
    border-radius: 999px; border: 1px solid transparent;
    white-space: nowrap; text-transform: capitalize;
  }
  .badge svg { width: 12px; height: 12px; }
  .badge-default { background: var(--primary); color: var(--primary-foreground); }
  .badge-secondary { background: var(--secondary); color: var(--secondary-foreground); }
  .badge-outline { border-color: var(--border); color: var(--foreground); }
  .badge-destructive { background: color-mix(in srgb, var(--destructive) 10%, transparent); color: var(--destructive); }

  .status {
    display: inline-flex; align-items: center; height: 20px; padding: 0 8px;
    font-size: 12px; font-weight: 500; border-radius: 999px; border: 1px solid;
    text-transform: capitalize;
  }
  .status-success { background: var(--status-success-bg); color: var(--status-success-fg); border-color: var(--status-success-border); }
  .status-warning { background: var(--status-warning-bg); color: var(--status-warning-fg); border-color: var(--status-warning-border); }
  .status-info    { background: var(--status-info-bg); color: var(--status-info-fg); border-color: var(--status-info-border); }
  .status-accent  { background: var(--status-accent-bg); color: var(--status-accent-fg); border-color: var(--status-accent-border); }
  .status-danger  { background: var(--status-danger-bg); color: var(--status-danger-fg); border-color: var(--status-danger-border); }
  .status-neutral { background: var(--status-neutral-bg); color: var(--status-neutral-fg); border-color: var(--status-neutral-border); }

  /* --- Dashboard stats --- */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 1100px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    padding: 20px 22px;
    background: linear-gradient(155deg, #faf8f2 0%, #f5f2e8 55%, #ede9dc 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.55),
      0 0 0 1px color-mix(in srgb, var(--foreground) 8%, transparent),
      0 1px 2px rgba(61,57,41,0.04);
  }
  .stat-card .row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .stat-card .label { font-size: 15px; font-weight: 500; color: color-mix(in srgb, var(--foreground) 75%, transparent); line-height: 1.3; }
  .stat-card .trend-badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 26px; padding: 0 10px;
    font-size: 12px; font-weight: 500;
    border-radius: 999px;
    background: rgba(255,255,255,0.7);
    color: var(--foreground);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--foreground) 10%, transparent);
    white-space: nowrap; flex-shrink: 0;
  }
  .stat-card .trend-badge svg { width: 14px; height: 14px; stroke-width: 2; }
  .stat-card .value { font-size: 34px; font-weight: 700; letter-spacing: -0.025em; margin: 10px 0 24px; line-height: 1; }
  .stat-card .desc { font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; color: var(--foreground); }
  .stat-card .desc svg { width: 16px; height: 16px; stroke-width: 2; }
  .stat-card .sub { font-size: 13px; color: color-mix(in srgb, var(--foreground) 55%, transparent); margin-top: 4px; font-weight: 400; }

  .split-grid { display: grid; grid-template-columns: 4fr 3fr; gap: 16px; }
  @media (max-width: 1100px) { .split-grid { grid-template-columns: 1fr; } }

  /* --- Chart (CSS bars) --- */
  .chart {
    display: grid; grid-template-columns: 24px 1fr; gap: 12px;
    height: 260px; padding: 8px 4px;
  }
  .chart-y { display: grid; grid-template-rows: repeat(5, 1fr); font-size: 12px; color: var(--muted-foreground); text-align: right; align-items: end; padding-bottom: 20px; }
  .chart-y span { transform: translateY(6px); }
  .chart-bars { display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 0 8px 0 8px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; max-width: 24px; background: var(--primary); border-radius: 4px 4px 0 0; }
  .bar-col .label { font-size: 11px; color: var(--muted-foreground); }

  /* --- Activity list --- */
  .activity { display: flex; flex-direction: column; gap: 24px; margin-top: 8px; }
  .activity-row { display: flex; align-items: center; gap: 16px; }
  .activity-meta { flex: 1; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 4px; }
  .activity-name { font-size: 14px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
  .activity-action { font-size: 14px; color: var(--muted-foreground); }
  .activity-time { font-size: 14px; color: var(--muted-foreground); }

  /* --- Tabs --- */
  .tabs-list {
    display: inline-flex; background: var(--muted); border-radius: 10px; padding: 4px; gap: 2px;
  }
  .tab {
    height: 28px; padding: 0 12px; border-radius: 8px;
    font-size: 13px; font-weight: 500; color: var(--muted-foreground);
    background: transparent; border: none; cursor: pointer; font-family: inherit;
  }
  .tab.active { background: var(--background); color: var(--foreground); box-shadow: var(--shadow-xs); }
  .tab:disabled { opacity: 0.5; cursor: not-allowed; }

  /* --- Table (MUI-DataGrid look-alike) --- */
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .filter-row .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .data-grid { border-radius: 12px; overflow: hidden; font-size: 14px; border: 1px solid var(--border); background: var(--card); }
  .dg-head {
    background: color-mix(in srgb, var(--muted) 70%, transparent);
    border-bottom: 1px solid var(--border);
    display: grid; font-size: 13px; font-weight: 600; color: var(--foreground);
  }
  .dg-head .cell { font-weight: 600; }
  .dg-head .cell, .dg-row .cell { padding: 14px 16px; display: flex; align-items: center; min-width: 0; }
  .dg-row { display: grid; border-bottom: 1px solid var(--border); cursor: pointer; transition: background-color .12s; }
  .dg-row:last-of-type { border-bottom: none; }
  .dg-row:hover { background: color-mix(in srgb, var(--muted) 60%, transparent); }
  .dg-row .cell.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .dg-cols-patients { grid-template-columns: 32px 1.3fr 1.5fr 0.9fr 0.7fr 0.9fr 40px; }
  .dg-cols-patients-head { grid-template-columns: 32px 1.3fr 1.5fr 0.9fr 0.7fr 0.9fr 40px; }
  .dg-cols-consult { grid-template-columns: 32px 1.2fr 1.2fr 0.7fr 0.7fr 1.1fr; }
  .dg-cols-rx { grid-template-columns: 32px 1.3fr 0.8fr 1fr 0.7fr 0.7fr 0.7fr; }
  .dg-cols-staff { grid-template-columns: 32px 1fr 1.5fr 0.9fr 0.8fr 50px; }
  .dg-check { display: grid; place-items: center; color: var(--border); padding: 12px 0; }
  .dg-check input { accent-color: var(--primary); }
  .dg-footer {
    background: var(--card); border-top: 1px solid var(--border);
    padding: 8px 14px; font-size: 13px; color: var(--muted-foreground);
    display: flex; align-items: center; justify-content: flex-end; gap: 12px;
  }

  .muted { color: var(--muted-foreground); }
  .mono { font-family: var(--font-mono); font-size: 13px; }

  /* --- Patient detail header --- */
  .p-header { padding: 16px 24px; }
  .p-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .id-pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 32px; padding: 0 10px; border: 1px solid var(--border);
    background: color-mix(in srgb, var(--muted) 50%, transparent);
    border-radius: 999px; font-family: var(--font-mono); font-size: 12px;
    color: var(--muted-foreground);
  }
  .id-pill svg { width: 14px; height: 14px; }
  .icon-exp-btn {
    height: 32px; width: 32px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--background); display: grid; place-items: center;
    color: var(--muted-foreground); cursor: pointer;
  }
  .icon-exp-btn:hover { background: var(--muted); color: var(--foreground); }
  .icon-exp-btn svg { width: 16px; height: 16px; }

  /* --- Consultation detail card --- */
  .consult-row .card { padding: 0; }
  .consult-row .inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
  .consult-row .left { display: flex; align-items: center; gap: 12px; }
  .type-icon { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }
  .type-icon svg { width: 16px; height: 16px; }
  .type-icon.info { background: var(--status-info-bg); color: var(--status-info-fg); }
  .type-icon.success { background: var(--status-success-bg); color: var(--status-success-fg); }
  .type-icon.neutral { background: var(--status-neutral-bg); color: var(--status-neutral-fg); }

  /* --- Alert --- */
  .alert {
    padding: 12px 16px; border-radius: 10px; font-size: 14px;
    border: 1px solid var(--status-warning-border);
    background: var(--status-warning-bg); color: var(--status-warning-fg);
  }
  .alert.info { border-color: var(--status-info-border); background: var(--status-info-bg); color: var(--status-info-fg); }

  /* --- Mobile hide --- */
  @media (max-width: 900px) { .hide-md { display: none; } }

  /* --- Profile page --- */
  .expandable-icon {
    display: inline-flex; align-items: center; gap: 6px;
    height: 32px; padding: 0 8px;
    border: 1px solid var(--border); background: var(--background);
    border-radius: 999px; cursor: pointer; color: var(--foreground);
    font-family: inherit; font-size: 13px;
    max-width: 32px; overflow: hidden; white-space: nowrap;
    transition: max-width .25s ease, padding .25s ease, background-color .12s;
  }
  .expandable-icon:hover:not(:disabled) { max-width: 280px; padding: 0 12px 0 8px; background: var(--muted); }
  .expandable-icon:disabled { opacity: 0.5; cursor: not-allowed; }
  .expandable-icon svg { width: 16px; height: 16px; flex-shrink: 0; }
  .expandable-icon .lbl { font-family: var(--font-mono); font-size: 12px; color: var(--muted-foreground); }

  .role-badge-admin  { background: color-mix(in srgb, var(--primary) 10%, transparent); color: var(--primary); border-color: color-mix(in srgb, var(--primary) 20%, transparent); }
  .role-badge-doctor { background: var(--status-info-bg); color: var(--status-info-fg); border-color: var(--status-info-border); }
  .role-badge-staff  { background: var(--status-neutral-bg); color: var(--status-neutral-fg); border-color: var(--status-neutral-border); }

  .form-card .card-title { color: var(--foreground); font-size: 16px; font-weight: 600; margin: 0; }
  .form-card .card-desc-top { font-size: 14px; color: var(--muted-foreground); margin: 4px 0 0; }
  .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 1100px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px)  { .form-grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .field label { font-size: 13px; font-weight: 500; color: var(--foreground); }
  .field label .req { color: #dc2626; margin-left: 2px; }
  .field .hint { font-size: 12px; color: var(--muted-foreground); }
  .field .input, .field .select {
    height: 40px; width: 100%; border: 1px solid var(--input); border-radius: 10px;
    background: var(--background); padding: 0 12px; font-size: 14px; font-family: inherit; color: inherit;
    outline: none; transition: border-color .12s, box-shadow .12s;
  }
  .field .input.readonly { background: color-mix(in srgb, var(--muted) 50%, transparent); color: var(--muted-foreground); }
  .field .input:focus-visible, .field .select:focus-visible { border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent); }
  .field .select {
    display: flex; align-items: center; justify-content: space-between; cursor: pointer;
    -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236e6d68' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m7 15 5 5 5-5'/><path d='m7 9 5-5 5 5'/></svg>");
    background-repeat: no-repeat; background-position: right 12px center;
    padding-right: 36px;
  }

  .day-pills { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 900px) { .day-pills { grid-template-columns: repeat(2, 1fr); } }
  .day-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; user-select: none; transition: background-color .12s, border-color .12s;
    background: var(--background);
  }
  .day-pill:hover { background: var(--muted); }
  .day-pill.checked { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 5%, transparent); }
  .day-pill .box {
    width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--input);
    background: var(--background); display: grid; place-items: center; flex-shrink: 0;
  }
  .day-pill.checked .box { background: var(--primary); border-color: var(--primary); color: #fff; }
  .day-pill.checked .box::after { content: ""; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg) translate(-1px, -1px); }
  .day-pill .label { font-size: 14px; font-weight: 500; }

  .separator-h { height: 1px; background: var(--border); margin: 16px 0; }
  .form-footer { display: flex; justify-content: flex-end; margin-top: 8px; }

  .profile-header-card { padding: 16px 24px; }
  .profile-header-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .profile-meta-row { display: flex; flex-wrap: wrap; gap: 4px 16px; margin-top: 8px; font-size: 14px; color: var(--muted-foreground); align-items: center; }
  .profile-meta-row .mono { font-family: var(--font-mono); font-size: 12px; }

  /* Profile completeness */
  .completeness { display: flex; align-items: center; gap: 12px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .completeness-bar { flex: 1; height: 6px; background: var(--muted); border-radius: 999px; overflow: hidden; }
  .completeness-fill { height: 100%; background: var(--primary); border-radius: 999px; transition: width .3s ease; }
  .completeness-text { font-size: 13px; color: var(--muted-foreground); white-space: nowrap; }
  .completeness-text strong { color: var(--foreground); font-weight: 600; }
  .completeness-link { font-size: 13px; color: var(--primary); cursor: pointer; background: none; border: 0; padding: 0; font-family: inherit; }
  .completeness-link:hover { text-decoration: underline; }

  /* Header stat strip */
  .profile-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .profile-stat { padding: 0 16px; border-right: 1px solid var(--border); }
  .profile-stat:first-child { padding-left: 0; }
  .profile-stat:last-child { border-right: 0; padding-right: 0; }
  .profile-stat .val { font-size: 20px; font-weight: 600; color: var(--foreground); font-family: var(--font-serif); letter-spacing: -0.01em; }
  .profile-stat .lbl { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; }

  /* Verification chips */
  .verify-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; margin-left: 8px; }
  .verify-chip.verified { background: color-mix(in srgb, #16a34a 10%, transparent); color: #15803d; }
  .verify-chip.pending { background: color-mix(in srgb, #d97706 10%, transparent); color: #b45309; }
  .verify-chip i { width: 10px; height: 10px; }
  .field label .verify-chip { margin-left: auto; }
  .field label { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .field label .lbl-main { display: inline-flex; align-items: center; gap: 4px; }
  .field label .lock-icon { width: 11px; height: 11px; color: var(--muted-foreground); opacity: 0.6; }

  /* Working hours grid */
  .hours-grid { display: grid; gap: 10px; }
  .hours-row { display: grid; grid-template-columns: 120px 1fr 120px 12px 120px; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .hours-row:last-child { border-bottom: 0; }
  .hours-row .day-lbl { font-size: 14px; font-weight: 500; }
  .hours-row .switch { position: relative; width: 36px; height: 20px; background: var(--muted); border-radius: 999px; cursor: pointer; flex-shrink: 0; transition: background .15s; justify-self: start; }
  .hours-row .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,.15); transition: left .15s; }
  .hours-row.on .switch { background: var(--primary); }
  .hours-row.on .switch::after { left: 18px; }
  .hours-row.off .time-input, .hours-row.off .dash { opacity: 0.35; pointer-events: none; }
  .time-input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--background); font-size: 13px; font-family: inherit; }
  .dash { text-align: center; color: var(--muted-foreground); }

  /* Consultation type toggles */
  .consult-type-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 900px) { .consult-type-grid { grid-template-columns: 1fr; } }
  .consult-type-card { padding: 14px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; background: var(--background); transition: border-color .12s, background .12s; }
  .consult-type-card:hover { background: var(--muted); }
  .consult-type-card.on { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 5%, transparent); }
  .consult-type-card i { color: var(--primary); flex-shrink: 0; margin-top: 2px; }
  .consult-type-card .name { font-size: 14px; font-weight: 500; }
  .consult-type-card .desc { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; }
  .consult-type-card .check { margin-left: auto; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border); display: grid; place-items: center; flex-shrink: 0; }
  .consult-type-card.on .check { background: var(--primary); border-color: var(--primary); }
  .consult-type-card.on .check::after { content: ""; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg) translate(-1px, -1px); }

  /* Danger zone */
  .danger-zone { border-color: color-mix(in srgb, var(--destructive) 20%, var(--border)) !important; }
  .danger-zone .card-title { color: var(--destructive) !important; }
  .danger-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .danger-row:last-child { border-bottom: 0; padding-bottom: 0; }
  .danger-row:first-child { padding-top: 0; }
  .danger-row .info .ttl { font-size: 14px; font-weight: 500; }
  .danger-row .info .sub { font-size: 13px; color: var(--muted-foreground); margin-top: 2px; }
  .btn-danger-outline { background: var(--background); border: 1px solid color-mix(in srgb, var(--destructive) 30%, var(--border)); color: var(--destructive); padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-danger-outline:hover { background: color-mix(in srgb, var(--destructive) 5%, transparent); }

  /* Sticky save bar */
  .sticky-save { position: sticky; bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; background: var(--background); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px -10px rgba(0,0,0,.15); margin-top: 16px; }
  .sticky-save .msg { font-size: 13px; color: var(--muted-foreground); display: inline-flex; align-items: center; gap: 8px; }
  .sticky-save .msg .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
  .sticky-save .actions { display: inline-flex; gap: 8px; }
  .btn-ghost { background: transparent; border: 0; color: var(--muted-foreground); padding: 8px 12px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 8px; font-family: inherit; }
  .btn-ghost:hover { background: var(--muted); color: var(--foreground); }
</style>

function field({ label, value = "", required, placeholder = "", readonly, type = "text", hint, id, verified, lock }) {
  const cls = ["input", readonly ? "readonly" : ""].filter(Boolean).join(" ");
  const verifyChip = verified === "verified"
    ? `<span class="verify-chip verified">${icon("check")}Verified</span>`
    : verified === "pending"
      ? `<span class="verify-chip pending">${icon("clock")}Pending</span>`
      : "";
  const lockIcon = lock ? `<i data-lucide="lock" class="lock-icon" title="Managed by your account provider"></i>` : "";
  return `
    <div class="field">
      <label${id ? ` for="${id}"` : ""}><span class="lbl-main">${label}${lockIcon}${required ? `<span class="req">*</span>` : ""}</span>${verifyChip}</label>
      <input ${id ? `id="${id}"` : ""} class="${cls}" type="${type}" value="${value}" placeholder="${placeholder}" ${readonly ? "readonly" : ""} />
      ${hint ? `<span class="hint">${hint}</span>` : ""}
    </div>`;
}

function selectField({ label, value, required, options, id, placeholder = "Select an option" }) {
  return `
    <div class="field">
      <label${id ? ` for="${id}"` : ""}>${label}${required ? `<span class="req">*</span>` : ""}</label>
      <select ${id ? `id="${id}"` : ""} class="select">
        <option value="" ${value ? "" : "selected"} disabled>${placeholder}</option>
        ${options.map(o => `<option value="${o}" ${o === value ? "selected" : ""}>${o}</option>`).join("")}
      </select>
    </div>`;
}

/* --- events --- */
document.addEventListener("click", (e) => {
  const goto = e.target.closest("[data-goto]");
  if (goto) {
    e.preventDefault();
    const p = goto.dataset.goto;
    state.page = p;
    render();
    return;
  }
  const pRow = e.target.closest("[data-patient]");
  if (pRow) {
    state.selectedPatientId = pRow.dataset.patient;
    state.page = "patient-detail";
    render();
    return;
  }
  if (e.target.closest("[data-toggle-sidebar]")) {
    state.sidebarCollapsed = !state.sidebarCollapsed;
    render();
    return;
  }
  const cv = e.target.closest("[data-consult-view]");
  if (cv) {
    state.consultView = cv.dataset.consultView;
    render();
    return;
  }
  const pt = e.target.closest("[data-profile-tab]");
  if (pt) {
    state.profileTab = pt.dataset.profileTab;
    render();
    return;
  }
  const dp = e.target.closest(".day-pill");
  if (dp) {
    dp.classList.toggle("checked");
    return;
  }
  const hoursToggle = e.target.closest("[data-toggle-day]");
  if (hoursToggle) {
    const row = hoursToggle.closest(".hours-row");
    row.classList.toggle("on");
    row.classList.toggle("off");
    return;
  }
  const ctCard = e.target.closest("[data-consult-type]");
  if (ctCard) {
    ctCard.classList.toggle("on");
    return;
  }
});

render();
</script>
</body>
</html>
