name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ── 1. Validate: typecheck + lint ──────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

  # ── 2. Deploy preview (PRs) ───────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel (preview)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "### 🔗 Preview deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

  # ── 3. Deploy dev (dev branch) ─────────────────────────────────────
  deploy-dev:
    name: Deploy Dev
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=dev --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --target=dev --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel (dev)
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --target=dev --token=${{ secrets.VERCEL_TOKEN }})
          echo "### 🧪 Dev deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Alias: https://clinic.dev.quity.com.au" >> "$GITHUB_STEP_SUMMARY"

  # ── 4. Deploy production (main branch) ─────────────────────────────
  deploy-production:
    name: Deploy Production
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel (production)
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "### 🚀 Production deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
